version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: dockerfile
    ports:
      - "3100:3000"
    environment:
      DATABASE_URL: postgresql://hotel:hotelpass@db:5432/hotel_tracker
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-changeme}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotelpass
      POSTGRES_DB: hotel_tracker
    ports:
      - "5432:5432"
    volumes:
      - hotel_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotel -d hotel_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  hotel_db_data:
